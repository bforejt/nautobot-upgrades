<text x="340" y="1367" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#1a1a1a"><tspan x="340" dy="0">Sync Nautobot software version</tspan><tspan x="340" dy="14">(+ optional remove-inactive cleanup)</tspan></text>
